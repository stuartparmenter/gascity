# Dolt Health — reusable Dolt database health monitoring topology.
#
# Provides a fallback "dog" agent pool so the topology works standalone.
# When composed with a topology that provides its own non-fallback dog
# (e.g. maintenance), the consumer's fully-configured dog wins silently.

[topology]
name = "dolt-health"
schema = 1

[[doctor]]
name = "check-dolt"
script = "doctor/check-dolt.sh"
description = "Verify Dolt binary is available"

[formulas]
dir = "formulas"

[[agents]]
name = "dog"
scope = "city"
fallback = true
nudge = "Check your hook for work assignments."
idle_timeout = "2h"
[agents.pool]
min = 0
max = 3
